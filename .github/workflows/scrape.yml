# .github/workflows/scrape.yml

name: Deliveroo Daily Scrape

on:
  schedule:
    - cron: '0 7 * * *'   # 7:00 AM UTC = 8 AM BST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install playwright playwright-stealth==1.0.6
          python -m playwright install chromium --with-deps

      - name: Run scraper
        env:
          DELIVEROO_COOKIES: ${{ secrets.DELIVEROO_COOKIES }}
        run: python scraper_cloud.py

      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git add debug.png 2>/dev/null || true
          git diff --cached --quiet || git commit -m "data: scrape $(date +'%Y-%m-%d')"
          git push
