# .github/workflows/scrape.yml
# Place this file in your repo at: .github/workflows/scrape.yml

name: Deliveroo Daily Scrape

on:
  schedule:
    - cron: '0 7 * * *'   # runs every day at 7:00 AM UTC (8 AM BST)
  workflow_dispatch:        # also allows manual run from GitHub Actions tab

permissions:
  contents: write           # needed to commit data.json back to repo

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install playwright playwright-stealth==1.0.6
          playwright install chromium --with-deps

      - name: Run scraper
        env:
          DELIVEROO_COOKIES: ${{ secrets.DELIVEROO_COOKIES }}
        run: python scraper_cloud.py

      - name: Commit updated data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet || git commit -m "data: scrape $(date +'%Y-%m-%d')"
          git push
