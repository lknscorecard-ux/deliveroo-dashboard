name: Deliveroo Scraper

on:
  schedule:
    - cron: '0 */2 * * *'   # every 2 hours — real-time updates throughout the day
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install playwright playwright-stealth==1.0.6 pynacl

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-v1

      - name: Install Playwright browser + system deps
        run: python -m playwright install chromium --with-deps

      - name: Run scraper
        env:
          DELIVEROO_TOKEN: ${{ secrets.DELIVEROO_TOKEN }}
          DELIVEROO_EMAIL: ${{ secrets.DELIVEROO_EMAIL }}
          DELIVEROO_PASSWORD: ${{ secrets.DELIVEROO_PASSWORD }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: python scraper_cloud.py

      - name: Commit results
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json debug.png || true
          git diff --cached --quiet || git commit -m "data: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
