name: Deliveroo Scraper

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install playwright playwright-stealth==1.0.6
          python -m playwright install chromium --with-deps
          sudo apt-get install -y xvfb

      - name: Run scraper
        env:
          DELIVEROO_EMAIL: ${{ secrets.DELIVEROO_EMAIL }}
          DELIVEROO_PASSWORD: ${{ secrets.DELIVEROO_PASSWORD }}
          DISPLAY: :99
        run: |
          Xvfb :99 -screen 0 1440x900x24 &
          sleep 2
          python scraper_cloud.py

      - name: Commit results
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json debug.png || true
          git diff --cached --quiet || git commit -m "data: $(date -u +%Y-%m-%d)"
          git push
